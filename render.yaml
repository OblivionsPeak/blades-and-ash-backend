services:
  - type: web
    name: blades-and-ash-backend
    env: node
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: SALON_TZ
        sync: false
      # Set to "external" so reminders are driven by an external scheduler
      # (POST /api/internal/run-reminders) instead of the in-process cron,
      # which is unreliable on the free tier. Pair with CRON_SECRET.
      - key: REMINDERS_TRIGGER
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: FRONTEND_URL
        sync: false
